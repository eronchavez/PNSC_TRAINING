<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sun</title>
    <style>
        *{
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        #sun 
        {
            position: relative;
            height: 100vh;
        }
        #circle 
        {
            position: absolute;
            top: 45%;
            left: 43%;
            border: 2px solid black;
            border-radius: 50%;
            height: 200px;
            width: 200px
        }

        .triangle 
        {
            position: absolute;
            width: 0;
            height: 0;
            top: 50%;
            left: 50%;
            border-style: solid;
            border-width: 90px 30px 0 30px;
            border-color: black transparent transparent transparent;
            color: white;
        }

        #sun > .triangle:nth-child(1) { transform: rotate(0deg) translate(150px)}
        #sun > .triangle:nth-child(2) { transform: rotate(45deg) translate(150px)}
        #sun > .triangle:nth-child(3) { transform: rotate(90deg) translate(150px)}
        #sun > .triangle:nth-child(4) { transform: rotate(135deg) translate(150px)}
        #sun > .triangle:nth-child(5) { transform: rotate(180deg) translate(150px)}
        #sun > .triangle:nth-child(6) { transform: rotate(225deg) translate(150px)}
        #sun > .triangle:nth-child(7) { transform: rotate(270deg) translate(150px)}
        #sun > .triangle:nth-child(8) { transform: rotate(315deg) translate(150px)}
    </style>
</head>

<body>
    <div id="sun">
        <div class="triangle"></div>
        <div class="triangle"></div>
        <div class="triangle"></div>
        <div class="triangle"></div>
        <div class="triangle"></div>
        <div class="triangle"></div>
        <div class="triangle"></div>
        <div class="triangle"></div>
        <div id="circle"></div>
    </div>
</body>
</html>
