<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module C | Log In Page</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
  

    <main>
    <div class="signIn">
        <div id="zap">
                <img src="icons/zap.png" alt="zap">
        </div>

        <h1>StudySprint</h1>
        <p>Focus,organize, and accelerate your academic performance.</p>

        <div class="signInForm">
                <h2>Sign In</h2>
                <p>Access your tasks and focus sprints</p>

                <form>
                    <div class="inputField">
                        <label for="email">Email</label>
                        <div class="inputContainer">
                            <input type="text" name="email" id="email">
                            <img src="icons/mail.png" alt="email" class="icon">
                        </div>
                    </div>
                    <div class="inputField">
                        <label for="password">Password</label>
                        <div class="inputContainer">
                            <input type="password" name="password" id="password">
                            <img src="icons/lock-keyhole.png" alt="lock" class="icon">
                            <img src="icons/eye.png" alt="eye" class="eye">
                        </div>
                    </div>

                    <div class="sign-in-btn">
                        <button><a href="dashboard.html">Sign In </a> <i data-lucide="arrow-right" width="15"></i></button>
                    </div>
                    
                 
                </form>
                    <div class="createAcc">
                        <p>New to StudyPrint? <a href="#">Create an account</a></p>
                    </div>
            </div>
       </div>
    </main>


<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script>
  
    lucide.createIcons();
</script>
</body>
</html>
