<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,viewport-fit=cover">
    <title>Mobile Lyon Web Service</title>
    <link rel="stylesheet" href="css/main.css">
    <!-- Android / PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1b81ef">
    <!-- iOS Add to Home Screen -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Lyon Service">
    <link rel="apple-touch-icon" href="images/icon.png">
</head>
<body>
    <div class="app">
        <header>
            <button id="backBtn" disabled><</button>
            <h1 id="viewTitle">Carparks</h1>
        </header>
         <main id="mainContent">
            <!-- View content injected here -->
        </main>
        <nav>
            <button class="nav-btn active" data-view="carparks">Carparks</button>
            <button class="nav-btn" data-view="events">Events</button>
            <button class="nav-btn" data-view="weather">Weather</button>
            <button class="nav-btn" data-view="planner">Travel</button>
            <button class="nav-btn" data-view="settings">Settings</button>
        </nav>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
